      # - name: Show added files if any
      #   if: ${{ steps.compare-files.outputs.files_added }}
      #   run: |
      #     echo "Markdown files to add: ${{ toJson(steps.compare-files.outputs.files_added) }}"
      #     echo "CSV: ${{ steps.compare-files.outputs.files_csv }}"

      # - name: Show removed files if any
      #   if: ${{ steps.compare-files.outputs.files_removed }}
      #   run: |
      #     echo "Markdown files to remove: ${{ toJson(steps.compare-files.outputs.files_removed) }}"

      - name: Ingest Articles
        id: ingest-articles
        run: |
          update_articles=$(IFS=',' read -ra files <<< "${{ inputs.article_paths_added }}"; printf "raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/%s," "${files[@]}" | sed 's/,$//')

          update_articles_json=$(echo "${{ inputs.article_paths_added }}" | jq -R 'split(",") | map("raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/" + . )')
          remove_articles_json=$(echo "${{ inputs.article_paths_removed }}" | jq -R 'split(",") | map("raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/" + . )')

          echo "articles_updated=$update_articles" >> $GITHUB_OUTPUT
          echo "articles_updated_json=$update_articles_json" >> $GITHUB_OUTPUT
          echo "articles_remove_json=$remove_articles_json" >> $GITHUB_OUTPUT

      - name: Debug output
        run: |
          echo "Updated files: ${{ steps.ingest-articles.outputs.articles_updated }}"
          echo "Updated files JSON: $(echo ${{ steps.ingest-articles.outputs.articles_updated_json }} | jq -r ."
          echo "Removed files JSON: $(echo ${{ steps.ingest-articles.outputs.articles_remove_json }} | jq -r ."

      - name: Convert code
        if: ${{ inputs.article_paths_added }}
        uses: philnewm/markdown-conversion@main
        with:
          markdown_file_urls: ${{ steps.ingest-articles.outputs.articles_updated }}
          output_dir_code: ${{ github.workspace }}/code

      - name: Upload gh_output
        if: ${{ inputs.article_paths_added }}
        uses: actions/upload-artifact@v4
        with:
          name: code_output
          path: ${{ github.workspace }}/code/*
          if-no-files-found: error


  push-to-pages-repo:
    needs:
      - collect-markdown-files
    if: false
    # ${{ inputs.article_paths_added || inputs.article_paths_removed }}
    # TODO put back in line after development
    # && github.event.workflow_run.head_branch == 'publish' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: philnewm/philnewm.github.io
          token: ${{ secrets.PAGES_PAT }}
          fetch-depth: 1

      - name: Get artifacts
        if: ${{ inputs.article_paths_added }}
        uses: actions/download-artifact@v4
        with:
          name: code_output
          path: tmp

      - name: Move artifact to target directory
        if: ${{ inputs.article_paths_added }}
        env:
          FILE_PATHS_ADD: ${{ needs.collect-markdown-files.outputs.articles_updated }}
        run: |
          mkdir -p docs/posts

          readarray -t file_array < <(echo '${{ env.FILE_PATHS_ADD }}' | jq -r '.[]')
          echo "Updating files: ${file_array[@]}"

          for file_path in "${file_array[@]}"; do
            file_path=$(basename "$file_path")
            # mkdir -p "$(dirname ${{ github.workspace }}/docs/posts/$file_path)"
            cp tmp/$(basename $file_path) ${{ github.workspace }}/docs/posts/$file_path
          done

          rm -Rf ${{ github.workspace }}/tmp

      - name: Remove obsolete files
        if: ${{ inputs.article_paths_removed }}
        env:
          FILE_PATHS_DEL: ${{ needs.collect-markdown-files.outputs.articles_remove }}
        run: |
          readarray -t file_array < <(echo '${{ env.FILE_PATHS_DEL }}' | jq -r '.[]')
          echo "Removing files: ${file_array[@]}"

          for file_path in "${file_array[@]}"; do
            file_path=$(basename "$file_path")
            rm -f "/${{ github.workspace }}/docs/posts/$file_path"
          done

      - name: Verify Artifact Location
        run: |
          echo "Files in /docs/posts:"
          ls -l /${{ github.workspace }}/docs/posts

      - name: Push new file to pages repo
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "[Automated] Update content"
            git push
          else
            echo "::warning::No changes to sync."
          fi

...
