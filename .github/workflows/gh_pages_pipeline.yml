---

name: Github Pages Pipeline

on:
  workflow_dispatch:
    inputs:
      article_paths_added:
        type: string
        description: 'File paths to process'
        required: false
        default: ""
      article_paths_removed:
        type: string
        description: 'File paths to remove'
        required: false
        default: ""

        
  workflow_call:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  URL: "raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
  TARGET_REPO: "philnewm.github.io"
  TARGET_BRANCH: "main"
  TARGET_PREFIX: "docs/posts/"

jobs:
  collect-markdown-files:
    runs-on: ubuntu-latest
    outputs:
      articles_updated: ${{ steps.ingest-articles.outputs.articles_updated }}
      articles_updated_json: ${{ steps.ingest-articles.outputs.articles_updated_json }}
      articles_remove_json: ${{ steps.ingest-articles.outputs.articles_remove_json }}

    steps:
