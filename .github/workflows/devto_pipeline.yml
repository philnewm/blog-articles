---

name: Dev.to Pipeline

on:
  # TODO remove this trigger after debugging
  workflow_dispatch:
    inputs:
      article_paths_added:
        type: string
        description: 'File paths to add'
        required: false
        default: ""
      article_paths_modified:
        type: string
        description: 'File paths to modify'
        required: false
        default: ""
      article_paths_removed:
        type: string
        description: 'File paths to remove'
        required: false
        default: ""

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  URL: "raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
  TARGET_REPO: "philnewm.github.io"
  TARGET_PREFIX: "https://philnewm.github.io"

jobs:
  collect-articles:
    runs-on: ubuntu-latest
    outputs:
      files_map: ${{ steps.compare-articles.outputs.files_map }}
      files_csv: ${{ steps.compare-articles.outputs.files_csv }}

    steps:
      # TODO cleanup this query mess
      # - name: Get markdown files from ${{ github.repository}}
      #   id: get-source-md-files
      #   run: |
      #     IGNORED_FILES_JSON=$(jq -R -c 'split(",")' <<< "${{ vars.IGNORED_FILES }}")

      #     md_files_json=$(gh api repos/${{ github.repository }}/git/trees/${{ github.ref_name }}?recursive=1 --jq '[.tree[].path | select(endswith(".md"))]')
      #     md_files_json=$(echo $md_files_json | jq --argjson ignored "$IGNORED_FILES_JSON" 'map(select(. as $file | $ignored | index($file) | not))')
      #     md_files_str=$(echo $md_files_json | jq -c)

      #     echo "source_files=$md_files_str" >> $GITHUB_OUTPUT
      #   env:
      #     GH_TOKEN: ${{ github.token }}

      - name: Get markdown files from ${{ github.repository}}
        id: get-source-md-files
        run: |
          combined_paths="${{ inputs.article_paths_added }}"

          if [[ -n "${{ inputs.article_paths_added }}" && -n "${{ inputs.article_paths_modified }}" ]]; then
            combined_paths+=",${{ inputs.article_paths_modified }}"
          elif [[ -z "${{ inputs.article_paths_added }}" ]]; then
            combined_paths="${{ inputs.article_paths_modified }}"
          fi

          convert_articles=$(IFS=',' read -ra files <<< "$combined_paths"; printf "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/%s," "${files[@]}" | sed 's/,$//')

          add_articles_json=$(echo "${{ inputs.article_paths_added }}" | jq -Rc 'split(",")')
          update_articles_json=$(echo "${{ inputs.article_paths_modified }}" | jq -Rc 'split(",")')
          remove_articles_json=$(echo "${{ inputs.article_paths_removed }}" | jq -Rc 'split(",")')

          articles_map='{"added": $add, "updated": $update, "removed": $remove}'

          echo "convert_articles=$convert_articles" >> $GITHUB_OUTPUT
          echo "articles_map=$articles_map" >> $GITHUB_OUTPUT

          # echo "articles_added_json=$add_articles_json" >> $GITHUB_OUTPUT
          # echo "articles_updated_json=$update_articles_json" >> $GITHUB_OUTPUT
          # echo "articles_removed_json=$remove_articles_json" >> $GITHUB_OUTPUT

      # - name: Get article canonical_urls from dev.to
      #   # TODO set to empty values as default  - defaults to null otherwise
      #   id: get-target-articles
      #   run: |
      #     articles_map=$(curl -H "api-key: ${{ secrets.DEVTO_KEY }}" https://dev.to/api/articles/me/all | jq -c 'map({(.canonical_url): .id}) | add')
      #     articles_string=$(echo $articles_map | jq -c)

      #     echo "articles_map=$articles_string" >> $GITHUB_OUTPUT

      - name: Debug output
        run: |
          echo "source_files='${{ steps.get-source-md-files.outputs.convert_articles }}'"
          echo "target_articles=$(echo '${{ steps.get-source-md-files.outputs.articles_map }}' | jq -r)"

      - name: Compare files
        id: compare-articles
        if : false
        env:
          SOURCE: "${{ steps.get-source-md-files.outputs.source_files }}"
          TARGET: "${{ steps.get-target-articles.outputs.articles_map }}"
          BASE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/${{ github.ref_name }}/"
        # INFO create a md file to article id map
        # Depends on comparison between file paths from source repo and canonical_urls from dev.to query
        # Filepath and article id present -> update existing article
        # Filepath missing but id present -> articles was removed  so remove also on dev.to
        # Filepath present but id missing -> create new article on dev.to
        # INFO so far no checks if any changes actual happened
        run: |
          normalized_source_files=$(echo '${{ env.SOURCE }}' | jq -c 'map(sub("\\.md$"; ""))')
          normalized_target_articles=$(echo '${{ env.TARGET }}' | jq -c 'to_entries | map({ key: ( .key | sub("^${{ env.TARGET_PREFIX }}/"; "") | sub("/$"; "") ), value: .value }) | from_entries')

          echo "normalized_source_files: $normalized_source_files"
          echo "normalized_target_articles: $normalized_target_articles"

          md_to_id_mapping=$(jq -nc \
                      --argjson src "$normalized_source_files" \
                      --argjson tgt "$normalized_target_articles" \
                      '
                      reduce $src[] as $file ({}; 
                      .[$file + ".md"] = if $tgt[$file] then $tgt[$file] else "" end
                      )
                      | reduce ($tgt | keys[]) as $article (.;
                          if ($src | index($article)) == null then
                          .[""] = $tgt[$article]
                          else
                          .
                          end
                      )
                      ')

          echo "files_map=$md_to_id_mapping" >> $GITHUB_OUTPUT

          files_csv=$(echo '${{ env.SOURCE }}' | jq -r --arg base "https://raw.githubusercontent.com/philnewm/blog-articles/refs/heads/pages-debug/" '[.[] | $base + .] | join(",")')
          echo "files_csv=$files_csv"

          files_csv=$(echo '${{ env.SOURCE }}' | jq -r --arg base "${{ env.BASE_URL }}" '[.[] | $base + .] | join(",")')
          echo "files_csv=$files_csv" >> $GITHUB_OUTPUT

      - name: Debug output
        run: |
          echo "files_map=$(echo '${{ steps.compare-articles.outputs.files_map }}' | jq -r)"
          echo "source_files= ${{ steps.compare-articles.outputs.files_csv }}"

      - name: Convert code and admonitions
        if: ${{ inputs.article_paths_added || inputs.article_paths_modified }}
        uses: philnewm/markdown-conversion@main
        with:
          markdown_file_urls: ${{ steps.get-source-md-files.outputs.convert_articles }}
          output_dir_code: ${{ github.workspace }}/code
          output_dir_admonitions: ${{ github.workspace }}/admonitions
          code_parameters: "true"

      # INFO admonitions file includes code conversion - which is a design issue
      - name: Upload gh_output
        uses: actions/upload-artifact@v4
        with:
          name: admonitions_output
          path: ${{ github.workspace }}/admonitions/*
          if-no-files-found: error


  push-to-devto:
    needs:
      - collect-articles
    if: false  # ${{ needs.collect-articles.outputs.files_csv }}
    # TODO put back in line after development
    # && github.event.workflow_run.head_branch == 'publish' }}
    runs-on: ubuntu-latest

    steps:
      - name: Get artifacts
        if: ${{ needs.collect-articles.outputs.files_csv }}
        uses: actions/download-artifact@v4
        with:
          name: admonitions_output
          path: tmp

      - name: Apply changes to articles
        uses: philnewm/blog-upload@main
        # TODO fix static reference to TARGET_PREFIX
        with:
          articles_map: ${{ needs.collect-articles.outputs.files_map }}
          markdown_files_dir: "${{ github.workspace }}/tmp/"
          service: "Devto"
          gh_pages_repo: ${{ env.TARGET_PREFIX }}
          key: ${{ secrets.DEVTO_KEY }}
          publish: ${{ vars.AUTO_PUBLISH }}

...
