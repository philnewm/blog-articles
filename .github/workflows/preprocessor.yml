---

name: blog-preprocessor

on:
  # TODO remove this trigger after debugging
  workflow_dispatch:
  push:
    branches:
      - publish

  workflow_run:
      workflows:
      - getting-started-ci
      types:
      - completed

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  URL: "raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
  TARGET_REPO: "philnewm.github.io"
  TARGET_PREFIX: "site/docs/"

jobs:
  collect-markdown-files:
    runs-on: ubuntu-latest
    outputs:
      files_added: ${{ steps.compare-files.outputs.files_added }}
      files_removed: ${{ steps.compare-files.outputs.files_removed }}

    steps:
      # TODO cleanup this query mess
      - name: Get markdown files from ${{ github.repository}}
        id: get-source-md-files
        # TODO change to publish branch when implemented
        run: |
          IGNORED_FILES_JSON=$(jq -R -c 'split(",")' <<< "${{ vars.IGNORED_FILES }}")
          md_files_json=$(gh api repos/philnewm/blog-articles/git/trees/pages-debug?recursive=1 --jq '[.tree[].path | select(endswith(".md"))]')
          md_files_json=$(echo $md_files_json | jq --argjson ignored "$IGNORED_FILES_JSON" 'map(select(. as $file | $ignored | index($file) | not))')
          md_files_str=$(echo $md_files_json | jq -c)

          echo "source_files=$md_files_str" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get markdown files from ${{ env.TARGET_REPO}}
        id: get-target-md-files
        run: |
          IGNORED_FILES_JSON=$(jq -R -c 'split(",")' <<< "${{ vars.IGNORED_FILES_TARGET }}")
          md_files_json=$(gh api repos/philnewm/philnewm.github.io/git/trees/main?recursive=1 --jq '[.tree[].path | select(endswith(".md"))]')
          md_files_json=$(echo $md_files_json | jq --argjson ignored "$IGNORED_FILES_JSON" 'map(select(. as $file | $ignored | index($file) | not))')
          md_files_json=$(echo $md_files_json | jq 'map(sub("^${{ env.TARGET_PREFIX }}"; ""))')
          md_files_str=$(echo $md_files_json | jq -c)

          echo "target_files=$md_files_str" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Debug output
        run: |
          echo "source_files=$(echo '${{ steps.get-source-md-files.outputs.source_files }}' | jq -r)"
          echo "target_files=$(echo '${{ steps.get-target-md-files.outputs.target_files }}' | jq -r)"

      - name: Compare files
        id: compare-files
        run: |
          source_files=$(echo '${{ steps.get-source-md-files.outputs.source_files }}' | jq -r)
          target_files=$(echo '${{ steps.get-target-md-files.outputs.target_files }}' | jq -r)

          files_added=$(echo $source_files $target_files | jq -s -c '.[0] - .[1]')
          files_removed=$(echo $source_files $target_files | jq -s -c '.[1] - .[0]')

          echo "files_added=$files_added" >> $GITHUB_OUTPUT
          echo "files_removed=$files_removed" >> $GITHUB_OUTPUT

      - name: Debug output
        run: |
          echo "added_files=$(echo '${{ steps.compare-files.outputs.files_added }}' | jq -r)"
          echo "removed_files=$(echo '${{ steps.get-target-md-files.outputs.files_removed }}' | jq -r)"

      - name: Show added files if any
        if: ${{ steps.compare-files.outputs.files_added }}
        run: |
          echo "Markdown files to add: ${{ toJson(steps.compare-files.outputs.files_added) }}"

      - name: Show removed files if any
        if: ${{ steps.compare-files.outputs.files_removed }}
        run: |
          echo "Markdown files to remove: ${{ toJson(steps.compare-files.outputs.files_removed) }}"

  convert-markdown:
    needs: collect-markdown-files
    if: ${{ needs.collect-markdown-files.outputs.files_added }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJson(needs.collect-markdown-files.outputs.files_added) }}

    steps:
      - name: Extract file name
        id: extract_filename
        run: |
          filename=$(basename "${{ matrix.file }}")
          echo "filename=$filename" >> $GITHUB_OUTPUT

      - name: Convert code and admonitions
        uses: philnewm/markdown-conversion@main
        env:
          FILE_NAME: ${{ steps.extract_filename.outputs.filename }}
        with:
          domain_url: ${{ env.URL }}
          markdown_file_path: ${{ matrix.file }}
          code: true
          output_file_code: ${{ github.workspace }}/code/${{ env.FILE_NAME }}
          admonitions: true
          output_file_admonitions: ${{ github.workspace }}/admonition/${{ env.FILE_NAME }}

      - name: Upload gh_output
        env:
          FILE_NAME: ${{ steps.extract_filename.outputs.filename }}
        uses: actions/upload-artifact@v4
        with:
          name: gh_output
          path: ${{ github.workspace }}/code/${{ env.FILE_NAME }}
          if-no-files-found: error

      - name: Upload devto_output
        env:
          FILE_NAME: ${{ steps.extract_filename.outputs.filename }}
        uses: actions/upload-artifact@v4
        with:
          name: devto_output
          path: ${{ github.workspace }}/admonition/${{ env.FILE_NAME }}
          if-no-files-found: error

  push-to-pages-repo:
    needs:
      - collect-markdown-files
      - convert-markdown
    if: false  ${{ always() && (needs.collect-markdown-files.outputs.files_added || needs.collect-markdown-files.outputs.files_removed) }}
    # TODO put back in line after development
    # && github.event.workflow_run.head_branch == 'publish' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: philnewm/philnewm.github.io
          token: ${{ secrets.PAGES_PAT }}
          fetch-depth: 1

      - name: Get artifacts
        if: ${{ needs.collect-markdown-files.outputs.files_added }}
        uses: actions/download-artifact@v4
        with:
          name: gh_output
          path: tmp

      - name: Move artifact to target directory
        if: ${{ needs.collect-markdown-files.outputs.files_added }}
        env:
          FILE_PATHS_ADD: ${{ needs.collect-markdown-files.outputs.files_added }}
        run: |
          mkdir -p site/docs
          echo "Updating files: $('${{ env.FILE_PATHS_ADD }}' | jq -r '.[]'))"

          for file in $(echo "${FILE_PATHS_ADD}" | jq -r '.[]'); do
            mkdir -p "$(dirname $file)"
            cp tmp/$file /${{ github.workspace }}/site/docs/$file
            rm -Rf /${{ github.workspace }}/tmp
          done

      - name: Remove obsolete files
        if: ${{ needs.collect-markdown-files.outputs.files_removed }}
        env:
          FILE_PATHS_DEL: ${{ needs.collect-markdown-files.outputs.files_removed }}
        run: |
          echo "Removing files: $('${{ env.FILE_PATHS_DEL }}' | jq -r '.[]'))"
          for file in $(echo "${FILE_PATHS_DEL}" | jq -r '.[]'); do
            rm -f "/${{ github.workspace }}/site/docs/$file"
          done

      - name: Verify Artifact Location
        run: |
          echo "Files in site/docs:"
          ls -l /${{ github.workspace }}/site/docs

      - name: Push new file to pages repo
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "[Automated] Update content"
            git push
          else
            echo "No changes to sync."
          fi

  push-to-devto:
    needs: convert-markdown
    if: false  # ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'publish' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: devto_output
          path: tmp

      - name: Upload to Dev.to
        uses: philnewm/blog-upload@main
        with:
          markdown_file_path: tmp/${{ env.FILE_NAME }}
          service: "devto"
          key: ${{ secrets.DEVTO_KEY }}
          canonical_url: 
          description: "This article is about using Vagrant and VirtualBox with Molecule to test Ansible roles."
          publish: False

...
