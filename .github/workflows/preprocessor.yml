---

name: blog-preprocessor

on:
  # TODO remove this trigger after debugging
  workflow_dispatch:
  push:
    branches:
      - publish

  workflow_run:
      workflows:
      - getting-started-ci
      types:
      - completed

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  URL: "raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}"
  TARGET_REPO: "philnewm.github.io"

jobs:
  collect-markdown-files:
    runs-on: ubuntu-latest
    outputs:
      files_added: ${{ steps.get-markdown-files.outputs.files_added }}
      files_removed: ${{ steps.get-markdown-files.outputs.files_removed }}

    steps:
      - name: Get markdown files from ${{ github.repository}}
        run: |
          IGNORED_FILES_JSON=$(jq -R -c 'split(",")' <<< "${{ vars.IGNORED_FILES }}")
          md_files_json=$(gh api repos/philnewm/blog-articles/git/trees/main?recursive=1 --jq "[.tree[].path | select(endswith('.md')] - $IGNORED_FILES_JSON")

          echo "source_files=$md_files_json" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get markdown files from ${{ env.TARGET_REPO}}
        run: |
          IGNORED_FILES_JSON=$(jq -R -c 'split(",")' <<< "${{ vars.IGNORED_FILES_TARGET }}")
          md_files_json=$(gh api repos/philnewm/philnewm.github.io/git/trees/main?recursive=1 --jq "[.tree[].path | select(endswith(".md")] - $IGNORED_FILES_JSON")

          echo "target_files=$md_files_json" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Debug output
        run: |
          echo "source_files=$(cat $GITHUB_OUTPUT | jq -r '.source_files')"
          echo "target_files=$(cat $GITHUB_OUTPUT | jq -r '.target_files')"

