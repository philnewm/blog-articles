---

name: blog-preprocessor

on:
  # TODO remove this trigger after debugging
  push:
    branches:
      - publish

  workflow_run:
      workflows:
      - getting-started-ci
      types:
      - completed

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  FILE_NAME: "ansible_molecule_using_vagrant_and_virtualbox.md"
  FILE_PATH: "ansible/molecule_getting_started/ansible_molecule_using_vagrant_and_virtualbox.md"
  URL: "raw.githubusercontent.com/philnewm/blog-articles/${{ github.ref_name }}"
  OUTPUT_CODE: "output_code/ansible_molecule_using_vagrant_and_virtualbox.md"
  OUTPUT_ADMONITIONS: "output_admonitions/ansible_molecule_using_vagrant_and_virtualbox.md"
  TARGET_REPO: "philnewm.github.io"

jobs:
  collect-markdown-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: philnewm/blog-articles
          fetch-depth: 1

      - name: Get markdown files
        run: |
          find . -type f -name "*.md" ! -path "*/.*/*" ! -name "README.md" ! -name "TODO.md" > md_files.txt

          files=$(cat md_files.txt | jq -R -s -c 'split("\n")[:-1]')
          echo -e "Markdown files found:\n\n$(echo "$files" | jq -r '.[]')"
          echo "files::$files" >> $GITHUB_OUTPUT

  convert-markdown:
    needs: collect-markdown-files
    runs-on: ubuntu-latest
    strategy:
      matrix:
        file: ${{ fromJson(needs.collect-markdown-files.outputs.files) }}

    steps:
      - name: Extract file name
        id: extract_filename
        run: |
          filename=$(basename "${{ matrix.file }}")
          echo "filename=$filename" >> $GITHUB_OUTPUT

      - name: Convert code and admonitions
        uses: philnewm/markdown-conversion@main
        with:
          domain_url: ${{ env.URL }}
          markdown_file_path: ${{ matrix.file }}
          code: true
          output_file_code: ${{ github.workspace }}/${{ steps.extract_filename.outputs.filename }}
          admonitions: true
          output_file_admonitions: ${{ github.workspace }}/${{ steps.extract_filename.outputs.filename }}

      - name: Upload gh_output
        uses: actions/upload-artifact@v4
        with:
          name: gh_output
          path: ${{ github.workspace }}/${{ env.OUTPUT_CODE }}
          if-no-files-found: error

      - name: Upload devto_output
        uses: actions/upload-artifact@v4
        with:
          name: devto_output
          path: ${{ github.workspace }}/${{ env.OUTPUT_ADMONITIONS }}
          if-no-files-found: error

  push-to-pages-repo:
    needs: convert-markdown
    # if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'publish' }}
    runs-on: ubuntu-latest
    # TODO implement a query to identify text files needing to be updated
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: philnewm/philnewm.github.io
          token: ${{ secrets.PAGES_PAT }}
          fetch-depth: 1

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: gh_output
          path: tmp

      - name: Move Artifact to Target Directory
        run: |
          mkdir -p site/docs
          cp tmp/${{ env.FILE_NAME }} /${{ github.workspace }}/site/docs/
          rm -Rf /${{ github.workspace }}/tmp

      - name: Verify Artifact Location
        run: |
          echo "Files in site/docs:"
          ls -l /${{ github.workspace }}/site/docs

      - name: Push new file to pages repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "[Automated] Add text file '${{ env.FILE_NAME }}' repository"
          git push

  push-to-devto:
    needs: convert-markdown
    # if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'publish' }}
    runs-on: ubuntu-latest
    # TODO implement a query to identify text files needing to be updated
    steps:
      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: devto_output
          path: tmp

      - name: Upload to Dev.to
        uses: philnewm/blog-upload@main
        with:
          markdown_file_path: tmp/${{ env.FILE_NAME }}
          service: "devto"
          key: ${{ secrets.DEVTO_KEY }}
          canonical_url: 
          description: "This article is about using Vagrant and VirtualBox with Molecule to test Ansible roles."
          publish: False

...
